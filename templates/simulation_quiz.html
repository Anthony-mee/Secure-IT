{% extends 'base.html' %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/simulations.css') }}">
{% endblock %}
{% block content %}
<section class="sim-breadcrumb">
  <a href="{{ url_for('simulation_results_page', attack_id=mission.attack_id) }}">← Back to results</a>
</section>

<section class="sim-quiz-shell" id="sim-quiz-app">
  <div class="sim-play-header">
    <div>
      <div class="sim-badge">{{ mission.icon }} Knowledge check</div>
      <h2 class="mt-2 text-2xl font-extrabold text-white">{{ mission.name }} Quiz</h2>
      <p class="mt-2 text-sm text-slate-300">Scenario-based questions connected to your mission actions.</p>
    </div>
    <div class="sim-progress-wrap">
      <div class="flex items-center justify-between text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">
        <span>Question</span>
        <span id="quiz-progress-label">1 / 1</span>
      </div>
      <div class="sim-progress-bar mt-2">
        <div class="sim-progress-fill" id="quiz-progress-fill"></div>
      </div>
    </div>
  </div>

  <section class="sim-panel mt-6" id="quiz-question-panel">
    <h3 class="text-xl font-bold text-white" id="quiz-question-text"></h3>
    <div class="mt-5 space-y-3" id="quiz-options"></div>
    <div class="sim-feedback-panel hidden mt-5" id="quiz-feedback-panel">
      <div class="text-xs font-bold uppercase tracking-[0.2em]" id="quiz-feedback-label"></div>
      <p class="mt-2 text-sm leading-7 text-slate-300" id="quiz-feedback-text"></p>
      <button type="button" class="sim-primary-btn mt-4" id="quiz-next-btn">Next question</button>
    </div>
  </section>

  <section class="sim-panel mt-6 hidden" id="quiz-summary-panel">
    <div class="sim-score-ring">
      <div class="sim-score-value" id="quiz-final-score">0%</div>
      <div class="sim-score-label">Quiz score</div>
    </div>
    <p class="mt-4 text-center text-sm text-emerald-200" id="quiz-points-earned"></p>
    <div class="mt-6 space-y-4" id="quiz-summary-feedback"></div>
    <div class="mt-6 flex flex-wrap justify-center gap-3">
      <a href="{{ url_for('simulations_page') }}" class="sim-primary-btn">Back to Cyber Range</a>
    </div>
  </section>
</section>

<script id="sim-quiz-data" type="application/json">{{ quiz_data_json | safe }}</script>
<script src="{{ url_for('static', filename='js/simulation-quiz.js') }}"></script>
{% endblock %}
